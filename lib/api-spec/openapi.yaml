      responses:
        "200":
          description: Money added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/transfer:
    post:
      operationId: transferMoney
      tags: [wallet]
      summary: Transfer money to another user
      security:
        - bearerAuth: []
      requestBody:
        required: true
