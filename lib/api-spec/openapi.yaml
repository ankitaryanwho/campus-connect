  # Chat
  /chat/conversations:
    get:
      operationId: getConversations
      tags: [chat]
      summary: Get user conversations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversations list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationsResponse"

    post:
      operationId: createConversation
      tags: [chat]
      summary: Create or get a direct conversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
      responses:
        "200":
          description: Conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /chat/conversations/{conversationId}/messages:
    get:
      operationId: getMessages
      tags: [chat]
      summary: Get messages in a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesResponse"

    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /chat/chatrooms:
    get:
      operationId: getChatrooms
      tags: [chat]
      summary: Get public chatrooms
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Chatrooms list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatroomsResponse"

  /chat/chatrooms/{chatroomId}/messages:
    get:
      operationId: getChatroomMessages
      tags: [chat]
      summary: Get chatroom messages
      security:
        - bearerAuth: []
      parameters:
        - name: chatroomId
          in: path
