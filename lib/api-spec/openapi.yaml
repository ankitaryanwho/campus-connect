components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BatchSubRequest:
      type: object
      required: [id, path]
      properties:
        id:
          type: string
          description: Caller-assigned identifier echoed back in the response
        method:
          type: string
          enum: [GET]
          default: GET
          description: HTTP method — only GET is supported
        path:
          type: string
          description: API path including optional query string (e.g. /posts or /marketplace?type=all)

    BatchSubResponse:
      type: object
      required: [id, status, body]
      properties:
        id:
          type: string
          description: Matches the id from the corresponding sub-request
        status:
          type: integer
          description: HTTP status code of the sub-request
        body:
          description: Parsed JSON body of the sub-request response

    BatchRequest:
      type: object
      required: [requests]
      properties:
        requests:
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/BatchSubRequest"

    BatchResponse:
      type: object
      required: [responses]
      properties:
        responses:
          type: array
          items:
            $ref: "#/components/schemas/BatchSubResponse"

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    # Auth schemas
    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [student, provider]
          default: student
        college:
          type: string
        program:
          type: string
      required:
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    # User schemas
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        avatar:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        college:
          type: string
          nullable: true
        program:
          type: string
          nullable: true
        role:
          type: string
          enum: [student, provider, admin]
        followersCount:
          type: integer
        followingCount:
          type: integer
        postsCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - followersCount
        - followingCount
        - postsCount
        - createdAt

    UserProfile:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            isFollowing:
              type: boolean
          required:
            - isFollowing

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
        college:
          type: string
        program:
          type: string
        avatar:
          type: string

    FollowResponse:
      type: object
      properties:
        following:
          type: boolean
        followersCount:
          type: integer
      required:
        - following
        - followersCount

    # Post schemas
    Post:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        mediaUrls:
          type: array
          items:
            type: string
        author:
          $ref: "#/components/schemas/User"
        likesCount:
          type: integer
        commentsCount:
          type: integer
        isLiked:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - content
        - mediaUrls
        - author
        - likesCount
        - commentsCount
        - isLiked
        - createdAt

    PostsResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        nextCursor:
          type: string
          nullable: true
      required:
        - posts

    CreatePostRequest:
      type: object
      properties:
        content:
          type: string
        mediaUrls:
          type: array
          items:
            type: string
      required:
        - content

    LikeResponse:
      type: object
      properties:
        liked:
          type: boolean
        likesCount:
          type: integer
      required:
        - liked
        - likesCount

    Comment:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        author:
          $ref: "#/components/schemas/User"
        postId:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - content
        - author
        - postId
        - createdAt

    CommentsResponse:
      type: object
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
      required:
        - comments

    CreateCommentRequest:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    # Chat schemas
    Conversation:
      type: object
      properties:
        id:
          type: string
        participants:
          type: array
          items:
            $ref: "#/components/schemas/User"
        lastMessage:
          $ref: "#/components/schemas/Message"
          nullable: true
        unreadCount:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - participants
        - unreadCount
        - updatedAt

    ConversationsResponse:
      type: object
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"
      required:
        - conversations

    CreateConversationRequest:
      type: object
      properties:
        participantId:
          type: string
      required:
        - participantId

    Message:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        senderAvatar:
          type: string
          nullable: true
        conversationId:
          type: string
          nullable: true
        chatroomId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - content
        - senderId
        - senderName
        - createdAt

    MessagesResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        nextCursor:
          type: string
          nullable: true
      required:
        - messages

    SendMessageRequest:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    Chatroom:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
        memberCount:
          type: integer
        lastMessage:
          $ref: "#/components/schemas/Message"
          nullable: true
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - category
        - memberCount
        - updatedAt

    ChatroomsResponse:
      type: object
      properties:
        chatrooms:
          type: array
          items:
            $ref: "#/components/schemas/Chatroom"
      required:
        - chatrooms

    # Wallet schemas
    Wallet:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        balance:
          type: number
        currency:
          type: string
          default: INR
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - balance
        - currency
        - updatedAt

    Transaction:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [credit, debit, transfer]
        amount:
          type: number
        description:
          type: string
        status:
          type: string
          enum: [pending, completed, failed]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - amount
        - description
        - status
        - createdAt

    TransactionsResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
      required:
        - transactions

    AddMoneyRequest:
      type: object
      properties:
        amount:
          type: number
          minimum: 1
        method:
          type: string
          enum: [upi, card, netbanking]
      required:
        - amount
        - method

    TransferRequest:
      type: object
      properties:
        recipientId:
          type: string
        amount:
          type: number
          minimum: 1
        note:
          type: string
      required:
        - recipientId
        - amount

    # Service schemas
    Assignment:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        price:
          type: number
        deliveryMode:
          type: string
          enum: [pdf, zip, physical]
        status:
          type: string
          enum: [open, accepted, completed, cancelled]
        poster:
          $ref: "#/components/schemas/User"
        acceptedBy:
          $ref: "#/components/schemas/User"
          nullable: true
        subject:
          type: string
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - price
        - deliveryMode
        - status
        - poster
        - createdAt

    AssignmentsResponse:
      type: object
      properties:
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/Assignment"
      required:
        - assignments

    CreateAssignmentRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        deliveryMode:
          type: string
          enum: [pdf, zip, physical]
        subject:
          type: string
        deadline:
          type: string
          format: date-time
      required:
        - title
        - description
        - price
        - deliveryMode

    CoachingSession:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        price:
          type: number
        sessionType:
          type: string
          enum: [one_on_one, group]
        subject:
          type: string
        mentor:
          $ref: "#/components/schemas/User"
        bookedBy:
          $ref: "#/components/schemas/User"
          nullable: true
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [available, booked, completed]
        maxStudents:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - price
        - sessionType
        - subject
        - mentor
        - status
        - maxStudents
        - createdAt

    CoachingSessionsResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/CoachingSession"
      required:
        - sessions

    CreateCoachingSessionRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        sessionType:
          type: string
          enum: [one_on_one, group]
        subject:
          type: string
        scheduledAt:
          type: string
          format: date-time
        maxStudents:
          type: integer
      required:
        - title
        - description
        - price
        - sessionType
        - subject
        - maxStudents

    Delivery:
      type: object
      properties:
        id:
          type: string
        pickupLocation:
          type: string
        dropLocation:
          type: string
        item:
          type: string
        status:
          type: string
          enum: [pending, accepted, picked_up, delivered, cancelled]
        requester:
          $ref: "#/components/schemas/User"
        deliveryAgent:
          $ref: "#/components/schemas/User"
          nullable: true
        fee:
          type: number
          default: 20
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - pickupLocation
        - dropLocation
        - item
        - status
        - requester
        - fee
        - createdAt

    DeliveriesResponse:
      type: object
      properties:
        deliveries:
          type: array
          items:
            $ref: "#/components/schemas/Delivery"
      required:
        - deliveries

    CreateDeliveryRequest:
      type: object
      properties:
        pickupLocation:
          type: string
        dropLocation:
          type: string
        item:
          type: string
        notes:
          type: string
      required:
        - pickupLocation
        - dropLocation
        - item

    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        budget:
          type: number
        category:
          type: string
        status:
          type: string
          enum: [open, in_progress, completed, cancelled]
        poster:
          $ref: "#/components/schemas/User"
        assignedTo:
          $ref: "#/components/schemas/User"
          nullable: true
        applicantsCount:
          type: integer
        deadline:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - budget
        - category
        - status
        - poster
        - applicantsCount
        - createdAt

    TasksResponse:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
      required:
        - tasks

    CreateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        budget:
          type: number
        category:
          type: string
        deadline:
          type: string
          format: date-time
      required:
        - title
        - description
        - budget
        - category

    # Notification schemas
    Notification:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [like, comment, follow, message, service, wallet]
        title:
          type: string
        body:
          type: string
        isRead:
          type: boolean
        data:
          type: object
          additionalProperties: true
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - title
        - body
        - isRead
        - createdAt

    NotificationsResponse:
      type: object
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        unreadCount:
          type: integer
      required:
        - notifications
        - unreadCount

    AdminLoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AdminLoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          type: object
          additionalProperties: true
      required: [token, user]

    AdminStatsResponse:
      type: object
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        totalRevenue:
          type: number
        todayRevenue:
          type: number
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        completedOrders:
          type: integer
        totalPosts:
          type: integer
        totalTransactions:
          type: integer
      required: [totalUsers, activeUsers, totalRevenue, todayRevenue, totalOrders, pendingOrders, completedOrders, totalPosts, totalTransactions]

    AdminAnalyticsResponse:
      type: object
      properties:
        revenueByDay:
          type: array
          items:
            type: object
            additionalProperties: true
        usersByDay:
          type: array
          items:
            type: object
            additionalProperties: true
        ordersByDay:
          type: array
          items:
            type: object
            additionalProperties: true
        revenueByService:
          type: array
          items:
            type: object
            additionalProperties: true
      required: [revenueByDay, usersByDay, ordersByDay, revenueByService]

    AdminUserRow:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        college:
          type: string
        program:
          type: string
        year:
          type: integer
          nullable: true
        emailVerified:
          type: boolean
        followersCount:
          type: integer
        postsCount:
          type: integer
        banned:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, role, emailVerified, followersCount, postsCount, banned, createdAt]

    AdminUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUserRow"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required: [users, total, page, pageSize]

    AdminServiceRow:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
        price:
          type: string
          nullable: true
        posterId:
          type: string
        posterName:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, title, status, posterId, posterName, createdAt]

    AdminServicesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminServiceRow"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required: [items, total, page, pageSize]

    AdminDeliveryRow:
      type: object
      properties:
        id:
          type: string
        requesterId:
          type: string
        requesterName:
          type: string
        deliveryAgentId:
          type: string
          nullable: true
        agentName:
          type: string
          nullable: true
        pickupType:
          type: string
        pickupLocation:
          type: string
        dropLocation:
          type: string
