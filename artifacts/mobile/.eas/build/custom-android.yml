build:
  name: Android (pnpm 10)
  steps:
    - eas/checkout
    - run:
        name: Activate pnpm 10 via Corepack
        command: |
          corepack enable
          corepack prepare pnpm@10.26.1 --activate
          echo "pnpm version: $(pnpm --version)"
    - run:
        name: Install dependencies
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Expo Prebuild (Android)
        command: EXPO_NO_GIT_STATUS=1 pnpm exec expo prebuild --platform android --clean
    - run:
        name: Install dependencies (post-prebuild)
        command: pnpm install --no-frozen-lockfile
    - eas/configure_eas_update
    - eas/run_gradle
    - eas/find_and_upload_build_artifacts
