services:
  # ── API Server ──────────────────────────────────────────────────────────────
  - type: web
    name: colyx-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: >-
      corepack enable &&
      pnpm --version &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.cjs
    healthCheckPath: /api/ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PROD_DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ── Admin Panel (Static Site) ───────────────────────────────────────────────
  - type: web
    runtime: static
    name: colyx-admin
    region: oregon
    plan: free
    rootDir: .
    buildCommand: >-
      corepack enable &&
      pnpm --version &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/admin run build
    staticPublishPath: artifacts/admin/dist
    envVars:
      - key: BASE_PATH
        value: /
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
